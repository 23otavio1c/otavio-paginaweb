<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Tech</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: aqua;
            text-align: center;
            padding: 20px;
        }

        main {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
        }

        h1, h2 {
            color: #333;
        }

        .autor {
            font-style: italic;
            color: #666;
        }

        img {
            width: 100%;
            border-radius: 8px;
        }

        button {
            margin-top: 10px;
            margin-right: 10px;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Blog Tech</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia e programação.</p>
    </header>

    <main>
        <img src="download (1).jpeg" alt="Bocchi tocando guitarra">

        <div>
            <h2>Meu Primeiro Post</h2>
            <p class="autor">Por: Otávio Henrique Pereira</p>

            <p>
                Seja bem-vindo ao meu novo blog! Aqui vou compartilhar
                conhecimentos de programação, dicas da área de tecnologia
                e muito mais.
            </p>

            <button>🎸 <span>0</span></button>
            <button>🎸💔 <span>0</span></button>
        </div>
    </main>

    <script>
        const botoes = document.querySelectorAll("button");

        botoes.forEach(botao => {
            botao.addEventListener("click", botaoClicado);
        });

        function botaoClicado(event) {
            const span = event.currentTarget.querySelector("span");
            span.textContent = Number(span.textContent) + 1;
        }
    </script>

</body>
</html>
